<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tuner</title>
<style>
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    margin: 0;
    padding: 1rem;
    background: #111;
    color: #eee;
    text-align: center;
  }
  h1 { font-size: 1.2rem; font-weight: 400; color: #888; }
  #note {
    font-size: 5rem;
    font-weight: 700;
    line-height: 1.1;
    min-height: 5rem;
  }
  #note .sharp { font-size: 2.5rem; vertical-align: super; color: #888; }
  #freq { font-size: 1.2rem; color: #aaa; min-height: 1.4rem; }
  #cents { font-size: 1.4rem; min-height: 1.6rem; }
  .in-tune { color: #3ad65a; }
  .flat { color: #4aa3ff; }
  .sharpish { color: #ff7a4a; }
  #meter { display: block; margin: 0.5rem auto; max-width: 100%; }
  #visualiser { display: block; margin: 0.5rem auto; max-width: 100%; }
  #thresholdControl { margin: 1rem auto; max-width: 400px; color: #aaa; font-size: 0.9rem; }
  #threshold { width: 80%; }
  #level { margin-top: 0.4rem; font-size: 0.85rem; color: #777; }
  #denoiseButton { background: #555; font-size: 0.9rem; padding: 0.4rem 1rem; }
  #denoiseStatus { margin-top: 0.4rem; font-size: 0.85rem; color: #777; }
  button {
    font-size: 1rem;
    padding: 0.5rem 1.2rem;
    margin: 0.5rem;
    border: none;
    border-radius: 6px;
    background: #2a7;
    color: #fff;
    cursor: pointer;
  }
  button:active { opacity: 0.7; }
</style>
</head>
<body>
<h1>Tuner</h1>
<div id="note">--</div>
<div id="cents">&nbsp;</div>
<div id="freq">&nbsp;</div>
<canvas id="meter" width="400" height="80"></canvas>
<div>
  <button id="startButton">Start</button>
</div>
<div id="thresholdControl">
  <label for="gain">ゲイン (入力増幅): <span id="gainValue">1.0</span>x</label><br>
  <input type="range" id="gain" min="1" max="16" step="0.5" value="1">
  <hr style="border-color:#333">
  <label for="threshold">最小振幅 (感度): <span id="thresholdValue">0.010</span></label><br>
  <input type="range" id="threshold" min="0" max="0.1" step="0.001" value="0.01">
  <div id="level">入力レベル: <span id="levelValue">0.000</span></div>
  <hr style="border-color:#333">
  <button id="denoiseButton">ノイズ除去</button>
  <div id="denoiseStatus">未適用</div>
</div>
<canvas id="visualiser" width="400" height="120"></canvas>
<script type="text/javascript" src="./pitch.js"></script>
<script type="text/javascript" src="./index.js"></script>
</body>
</html>
